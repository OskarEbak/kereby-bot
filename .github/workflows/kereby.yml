name: kereby-bot

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

concurrency:
  group: kereby-bot
  cancel-in-progress: false

jobs:
  run-bot:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}

    steps:
      - uses: actions/checkout@v4

      - name: Restore bot state (SQLite)
        uses: actions/cache/restore@v4
        with:
          path: ${{ github.workspace }}/kereby_seen.sqlite3
          key: kereby-state-v2-${{ github.run_id }}
          restore-keys: |
            kereby-state-v2-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          python -m playwright install chromium

      - name: Run bot repeatedly
        env:
          NTFY_TOPIC: kereby-oeupdate
          MAX_LISTINGS: "30"
          KEREBY_DB: ${{ github.workspace }}/kereby_seen.sqlite3
        run: |
          for i in {1..9}; do
            echo "Check $i at $(date -u)"
            python kereby_watch.py
            if [ "$i" -lt 9 ]; then
              sleep 30
            fi
          done

      - name: Save bot state (SQLite)
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ${{ github.workspace }}/kereby_seen.sqlite3
          key: kereby-state-v2-${{ github.run_id }}
