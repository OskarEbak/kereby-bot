name: kereby-bot

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

# Prevent overlapping runs if one gets delayed/queued
concurrency:
  group: kereby-bot
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"  # caches pip automatically based on requirements.txt

      # Cache Playwright browsers so Chromium isn't downloaded every run
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Install Playwright Chromium (uses cache if available)
        run: |
          python -m playwright install chromium
          
      - name: Cache bot state (SQLite)
        uses: actions/cache@v4
        with:
          path: kereby_seen.sqlite3
          key: kereby-state-v1
          restore-keys: kereby-state-
          
      - name: Run bot
        env:
          NTFY_TOPIC: kereby-oeupdate
          MAX_LISTINGS: "30"
          REQ_TIMEOUT_S: "15"
        run: |
          python kereby_watch.py
